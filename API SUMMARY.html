<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Khel AI Match Summary</title>

    <style>
        body {
            font-family: Arial;
            background: #f0f4f8;
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 360px;
            margin: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
        }

        button {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1e7e34;
        }

        .output {
            margin-top: 20px;
            text-align: left;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Khel AI Match Summary</h2>

    <input type="text" id="team" placeholder="Team Name">
    <input type="number" id="runs" placeholder="Runs">
    <input type="number" id="wickets" placeholder="Wickets">
    <input type="number" step="0.1" id="overs" placeholder="Overs">

    <br>
    <button onclick="generateSummary()">Generate Summary</button>

    <div class="output" id="result"></div>
</div>

<script>
async function generateSummary() {

    const team = document.getElementById("team").value;
    const runs = document.getElementById("runs").value;
    const wickets = document.getElementById("wickets").value;
    const overs = document.getElementById("overs").value;

    const resultBox = document.getElementById("result");

    if (!team || !runs || !wickets || !overs) {
        resultBox.innerHTML = "Fill all fields";
        return;
    }

    resultBox.innerHTML = "Processing...";

    try {
        const response = await fetch("https://summary-1-5fir.onrender.com/match-summary/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                team_name: team,
                runs: Number(runs),
                wickets: Number(wickets),
                overs: Number(overs)
            })
        });

        const data = await response.json();
        console.log("API RESPONSE:", data);

        // 🔥 THIS LINE SHOWS REAL ERROR INSTEAD OF UNDEFINED
        if (!data.team_name) {
            resultBox.innerHTML = "⚠️ API Response:<br>" + JSON.stringify(data);
            return;
        }

        resultBox.innerHTML = `
            Team: ${data.team_name} <br><br>
            ${data.summary} <br><br>
            Run Rate: ${data.run_rate} <br>
            Status: ${data.status}
        `;

    } catch (error) {
        resultBox.innerHTML = "Failed to connect";
        console.error(error);
    }
}
</script>

</body>
</html>
